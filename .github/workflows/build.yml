name: dspico8

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  tests:
    name: Desktop tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run C++ desktop tests
        run: make tests

      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run Rust desktop tests
        run: make rust-tests

      - name: Check Rust core bare-metal ARM build
        run: make rust-core-arm-check

  nds:
    name: Build Nintendo DS artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build native and baseline .nds artifacts with Docker
        run: ./scripts/build-nds-docker.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dspico8-nds
          path: |
            artifacts/DSPICO8.nds
            artifacts/DSPICO8-FAKE08-BASELINE.nds

      - name: Publish prerelease
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            artifacts/DSPICO8.nds
            artifacts/DSPICO8-FAKE08-BASELINE.nds
